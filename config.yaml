# WebSocket / IM 配置
ws:
  read_buffer_size: 1024
  write_buffer_size: 1024
  heartbeat_interval: 15
  instance_ttl: 60
  stale_clean_interval: 5
  rate_limit_window: 10
  rate_limit_max: 30
  dedup_ttl: 30
  poll_timeout: 2
  pong_timeout: 60
  write_timeout: 10
  online_broadcast_interval: 60


# Judge / Sandbox 配置
judge:
  sandbox:
    backends:
      - name: go-judge
        endpoint: localhost:5051
        timeout: 30
    health_check:
      interval: 30                    # 健康检查周期（秒）
      max_retry: 3                    # 连续失败次数后下线
      recovery_interval: 120          # 下线后每隔多久尝试恢复（秒）
  worker_count: 4                     # 判题 Worker 数量
  compile_time_limit: 10000           # 编译时间限制（ms）
  compile_memory_limit: 524288        # 编译内存限制（KB）

  # 语言定义：可动态扩展，添加新语言只需在此配置
  languages:
    - name: c
      interpreted: false
      compiler: gcc
      compile_args: ["main.c", "-o", "main"]
      compile_out: ["main"]
      run_args: ["./main"]
      source_file: main.c
    - name: cpp
      interpreted: false
      compiler: g++
      compile_args: ["main.cpp", "-o", "main"]
      compile_out: ["main"]
      run_args: ["./main"]
      source_file: main.cpp
    - name: go
      interpreted: false
      compiler: go
      compile_args: ["build", "-o", "main", "main.go"]
      compile_out: ["main"]
      run_args: ["./main"]
      source_file: main.go
    - name: rust
      interpreted: false
      compiler: rustc
      compile_args: ["main.rs", "-o", "main"]
      compile_out: ["main"]
      run_args: ["./main"]
      source_file: main.rs
    - name: java
      interpreted: false
      compiler: javac
      compile_args: ["Main.java"]
      compile_out: ["Main.class"]
      run_args: ["java", "Main"]
      source_file: Main.java
    - name: python3
      interpreted: true
      compiler: ""
      compile_args: []
      compile_out: []
      run_args: ["python3", "main.py"]
      source_file: main.py
    - name: python

# ── air live-reload configuration for hei-gin ────────────────────────
# https://github.com/air-verse/air
root = "."
tmp_dir = ".air_tmp"

[build]
  entrypoint = "main.go"
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  exclude_dir = [".air_tmp", ".git", "node_modules", "vitepress", ".github"]
  exclude_regex = [".*_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  delay = 1000  # ms
  stop_on_error = true
  send_interrupt = false
  kill_delay = 500  # ms

[color]
  main = "green"
  watcher = "cyan"
  build = "yellow"
  runner = "magenta"

[log]
  main_only = false
  time = false

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Run focused flake8
        run: |
          flake8 \
            sdk/config/settings.py \
            sdk/infra/concurrency.py \
            plugins/plugin_sys/auth/username/logic.py \
            plugins/plugin_client/auth/username/logic.py \
            plugins/plugin_client/user/service.py \
            plugins/plugin_client/user/api/v1/api.py \
            tests/test_settings_production.py \
            tests/test_lifespan_validation.py \
            tests/test_auth_username_logic.py \
            tests/test_client_user_service_async.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

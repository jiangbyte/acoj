<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hei Admin</title>
  </head>
  <body>
    <div id="app">
      <div class="app-first-loading">
        <div class="app-first-loading-spin"></div>
        <span>Hei Admin</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <style>
      .app-first-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-size: 18px; color: #666; gap: 16px; }
      .app-first-loading-spin { width: 32px; height: 32px; border: 3px solid #e8e8e8; border-top-color: #1677ff; border-radius: 50%; animation: app-spin 0.8s linear infinite; }
      @keyframes app-spin { to { transform: rotate(360deg); } }
    </style>
  </body>
</html>
